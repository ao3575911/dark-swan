name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install cryptography
      - name: Syntax check
        run: python -m py_compile ds_protocol_core.py ds_registry.py examples/generate_identity.py
      - name: Smoke test
        run: PYTHONPATH=. python examples/generate_identity.py
